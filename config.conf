# -------------------------- PostgreSQL配置 --------------------------
[postgresql]
DB_USER = postgres
DB_PASSWORD = 000000
DB_HOST = localhost
DB_PORT = 5432
DB_NAME = openmes_db

# --------------------------- 文件存储配置 ----------------------------
[storage]
SIGNATURE_STORAGE_PATH = static/signatures/
BACKUP_STORAGE_PATH = backups/
LOG_STORAGE_PATH = logs/
ARCHIVE_STORAGE_PATH = logs/archive/

# --------------------------- 备份配置 ----------------------------
[backup]
# 定时备份设置
ENABLE_AUTO_BACKUP = true
AUTO_BACKUP_TIME = 02:00  # 每天2:00执行备份
BACKUP_RETENTION_DAYS = 30  # 保留最近30天的备份
MAX_BACKUP_FILES = 50  # 最多保留50个备份文件

# 备份选项
DEFAULT_COMPRESS = true
DEFAULT_INCLUDE_TIMESTAMP = true

# --------------------------- 应用配置 ----------------------------
[app]
SECRET_KEY = your-secret-key-change-this
DEBUG = false
HOST = 0.0.0.0
PORT = 80

# --------------------------- 日志配置 ----------------------------
[logs]
LOG_RETENTION_DAYS = 7  # 保留最近7天的日志
LOG_LEVEL = INFO
